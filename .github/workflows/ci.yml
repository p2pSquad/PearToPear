name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-22.04

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libprotobuf-dev \
            libgrpc++-dev \
            libsqlite3-dev \
            libssl-dev

      - name: configure
        run: cmake -S . -B build -DPEAR_BUILD_TESTS=ON -DPEAR_DEBUG=OFF

      - name: build
        run: cmake --build build -j

      - name: test
        run: ctest --test-dir build -V

  macos-build-and-test:
    name: macos-build-and-test
    runs-on: macos-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          brew update
          brew install cmake pkg-config protobuf grpc sqlite openssl

      - name: configure
        run: |
          cmake -S . -B build \
            -DPEAR_BUILD_TESTS=ON \
            -DPEAR_DEBUG=OFF \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl)"

      - name: build
        run: cmake --build build -j

      - name: test
        run: ctest --test-dir build -V