name: CI

on:
  pull_request:
    branches:
      - main
      - add_paths
      - status-json-tests
  push:
    branches:
      - main
      - add_paths
      - status-json-tests

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-22.04

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libprotobuf-dev \
            libgrpc++-dev \
            libsqlite3-dev \
            libssl-dev

      - name: configure
        run: cmake -S . -B build -DPEAR_BUILD_TESTS=ON -DPEAR_DEBUG=OFF

      - name: build
        run: cmake --build build -j

      - name: test
        run: ctest --test-dir build -V