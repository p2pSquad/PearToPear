syntax = "proto3";

package pear.net;

service Master {
  rpc RegisterDevice(RegisterRequest) returns (RegisterResponse);
  rpc UpdateDB(UpdateDBRequest) returns (UpdateDBResponse);
  rpc PushWAL(PushWALRequest) returns (PushWALResponse);
}

service Storage {
  rpc DownloadFile(DownloadRequest) returns (stream FileChunk);
}

message RegisterRequest {
  string address = 1;
}

message RegisterResponse {
  bool success = 1;
  uint64 assigned_device_id = 2;

  repeated WalEntry full_wal = 3; // полный WAL для инициализации (Можно просто кидать БД, обсудим)

  string error_message = 4;
}

message UpdateDBRequest {
  uint64 last_seq_id = 1;
  uint64 device_id = 2;
}

message UpdateDBResponse {
  bool success = 1;
  repeated WalEntry entries = 2;
  string error_message = 3;
}

message PushWALRequest {
  uint64 device_id = 1;
  repeated WalEntry entries = 2;
}

message PushWALResponse {
  bool success = 1;
  repeated uint64 assigned_seq_ids = 2;
  string error_message = 3;
}

message DownloadRequest {
  string object_hash = 1;
  uint64 requester_device_id = 2;
}

message FileChunk {
  bytes data = 1;
  uint64 offset = 2;
  bool last_chunk = 3;
}

enum WalOpType {
  FILE_UPDATE = 0;
  DEVICE_UPDATE = 1;
  FILE_DELETE = 2;
}

message FileUpdate {
  string path = 1;
  string object_hash = 2;
  uint64 version = 3;
  uint64 owner_device_id = 4;
}

message FileDelete {
  string path = 1;
  uint64 version = 2;
  uint64 owner_device_id = 3;
}

message DeviceUpdate {
  uint64 device_id = 1;
  string address = 2;
}

message WalEntry {
  uint64 seq_id = 1;
  uint64 timestamp = 2;
  WalOpType op_type = 3;

  oneof data {
    FileUpdate file_update = 4;
    DeviceUpdate device_update = 5;
    FileDelete file_delete = 6;
  }
}
